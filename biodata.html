</html><!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Biodata Ergian Syah</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #1e3a8a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 85%;
    max-width: 900px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

.card {
    flex: 1;
    min-width: 250px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

img {
    width: 100%;
    border-radius: 15px;
}

h2 {
    text-align: center;
    color: #7dd3fc;
}

table {
    width: 100%;
}

td {
    padding: 8px;
}

.label {
    color: #93c5fd;
    width: 140px;
}

.btn {
    display: block;
    text-align: center;
    margin-top: 15px;
    padding: 10px;
    background: #3b82f6;
    border-radius: 10px;
    text-decoration: none;
    color: white;
}

.btn:hover {
    background: #60a5fa;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>
<body>

<div class="container">

    <!-- FOTO -->
    <div class="card">
        <img src="foto.jpeg" alt="Foto Ergian Syah">
    </div>

    <!-- BIODATA -->
    <div class="card">
        <h2>Biodata</h2>
        <table>
            <tr><td class="label">Nama</td><td>: Ergian Syah</td></tr>
            <tr><td class="label">TTL</td><td>: Tasikmalaya, 23 Maret 2008</td></tr>
            <tr><td class="label">Alamat</td><td>: Kp. Cikatulampa</td></tr>
            <tr><td></td><td>Desa Padawaras</td></tr>
            <tr><td></td><td>Kec. Cipatujah</td></tr>
            <tr><td></td><td>Kab. Tasikmalaya</td></tr>
            <tr><td></td><td>Jawa Barat</td></tr>
        </table>

        <a href="index.html" class="btn">← Kembali ke Cerita</a>
    </div>

</div>

</body>
</html>
